<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STUDY DOJO · SYSTEM</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container" id="systemContainer">
    <!-- ===== HEADER – centered ===== -->
    <header class="dojo-header">
      <h1>STUDY DOJO</h1>
      <p>System initialized. Train your brain. Dominate your exams.</p>
    </header>

    <!-- ===== USER IDENTITY ===== -->
    <section class="user-section">
      <label for="name">👤 USER REGISTRY</label>
      <input type="text" id="name" placeholder="Enter your name, Hunter." autofocus>
    </section>

    <!-- ===== SUBJECT & GRADE REGISTER (8 SLOTS) ===== -->
    <section class="marks-section">
      <h2>📜 SUBJECT & GRADE REGISTER</h2>
      <p class="subtext">Enter at least 3 subjects and their power levels (0–100).</p>
      <div class="subject-grid" id="subjectGrid">
        <!-- 8 rows will be populated by JavaScript -->
      </div>
    </section>

    <!-- ===== EXAM COUNTDOWN ===== -->
    <section class="exam-section">
      <h2>⏳ DAYS UNTIL FINAL BOSS (EXAM)</h2>
      <input type="number" id="days" min="0" max="365" placeholder="e.g., 30">
    </section>

    <!-- ===== ACTION BUTTONS ===== -->
    <div class="actions">
      <button id="analyzeBtn">🔥 RUN ANALYSIS</button>
      <button id="clearBtn" class="clear">🗑️ RESET SYSTEM</button>
      <button id="printBtn" class="print">📜 PRINT SCROLL</button>
    </div>

    <!-- ===== RESULTS / MOTIVATION AREA ===== -->
    <div id="results" class="results-card">
      <p style="color: #8899aa;">💪 Enter your stats and hit <strong>Run Analysis</strong> to get your personalized training plan.</p>
    </div>

    <footer>
      <p>✨ "Arise." – System ✨</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
